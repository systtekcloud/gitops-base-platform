# VaultStaticSecret — VSO creates keycloak-db-secret reading from Vault
# Requires: vault kv put secret/platform/keycloak db_password=<pass>
apiVersion: secrets.hashicorp.com/v1beta1
kind: VaultStaticSecret
metadata:
  name: keycloak-db-secret-sync
  namespace: keycloak
spec:
  type: kv-v2
  mount: secret
  path: platform/keycloak
  destination:
    name: keycloak-db-secret
    create: true
    transformation:
      templates:
        password:
          text: '{{ .Secrets.db_password }}'
        postgres-password:
          text: '{{ .Secrets.db_password }}'
  refreshAfter: 60s
  vaultAuthRef: keycloak-vault-auth
---
apiVersion: secrets.hashicorp.com/v1beta1
kind: VaultAuth
metadata:
  name: keycloak-vault-auth
  namespace: keycloak
spec:
  method: kubernetes
  mount: kubernetes
  kubernetes:
    role: keycloak
    serviceAccount: default

apiVersion: v1
kind: ServiceAccount
metadata:
  name: vault-init
  namespace: vault
  annotations:
    argocd.argoproj.io/sync-wave: "1"
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: vault-init
  namespace: vault
  annotations:
    argocd.argoproj.io/sync-wave: "1"
rules:
  - apiGroups:
      - ""
    resources:
      - secrets
    verbs:
      - get
      - create
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: vault-init
  namespace: vault
  annotations:
    argocd.argoproj.io/sync-wave: "1"
subjects:
  - kind: ServiceAccount
    name: vault-init
    namespace: vault
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: vault-init
---
apiVersion: batch/v1
kind: Job
metadata:
  name: vault-init
  namespace: vault
  annotations:
    argocd.argoproj.io/sync-wave: "1"
spec:
  backoffLimit: 6
  template:
    spec:
      serviceAccountName: vault-init
      restartPolicy: OnFailure
      containers:
        - name: vault-init
          image: hashicorp/vault:1.17
          command:
            - /bin/sh
            - -ec
            - |
              export VAULT_ADDR=http://vault.vault.svc.cluster.local:8200
              KUBE_API="https://${KUBERNETES_SERVICE_HOST}:${KUBERNETES_SERVICE_PORT_HTTPS}"
              KUBE_TOKEN="$(cat /var/run/secrets/kubernetes.io/serviceaccount/token)"
              KUBE_CA="/var/run/secrets/kubernetes.io/serviceaccount/ca.crt"

              kube_get() {
                path="$1"
                if command -v curl >/dev/null 2>&1; then
                  curl -fsS \
                    --cacert "$KUBE_CA" \
                    -H "Authorization: Bearer $KUBE_TOKEN" \
                    "${KUBE_API}${path}"
                else
                  wget -qO- \
                    --ca-certificate="$KUBE_CA" \
                    --header="Authorization: Bearer $KUBE_TOKEN" \
                    "${KUBE_API}${path}"
                fi
              }

              kube_post() {
                path="$1"
                body="$2"
                if command -v curl >/dev/null 2>&1; then
                  curl -fsS \
                    --cacert "$KUBE_CA" \
                    -H "Authorization: Bearer $KUBE_TOKEN" \
                    -H "Content-Type: application/json" \
                    -X POST \
                    "${KUBE_API}${path}" \
                    -d "$body"
                else
                  wget -qO- \
                    --ca-certificate="$KUBE_CA" \
                    --header="Authorization: Bearer $KUBE_TOKEN" \
                    --header="Content-Type: application/json" \
                    --post-data="$body" \
                    "${KUBE_API}${path}"
                fi
              }

              status_json=""
              until printf '%s' "$status_json" | grep -q '"initialized"'; do
                echo "Waiting for Vault API..."
                sleep 5
                status_json="$(vault status -format=json 2>/dev/null || true)"
              done

              if printf '%s' "$status_json" | grep -q '"initialized"[[:space:]]*:[[:space:]]*false'; then
                echo "Initializing Vault"
                init_json="$(vault operator init -key-shares=1 -key-threshold=1 -format=json)"
                printf '%s' "$init_json" > /tmp/init.json
                init_json_compact="$(printf '%s' "$init_json" | tr -d '\n')"

                unseal_key="$(printf '%s' "$init_json_compact" | sed -n 's/.*"unseal_keys_b64":[[:space:]]*\["\([^"]*\)".*/\1/p')"
                root_token="$(printf '%s' "$init_json_compact" | sed -n 's/.*"root_token":[[:space:]]*"\([^"]*\)".*/\1/p')"

                if [ -z "$unseal_key" ] || [ -z "$root_token" ]; then
                  echo "Failed to parse vault init output" >&2
                  exit 1
                fi

                init_json_b64="$(base64 /tmp/init.json | tr -d '\n')"
                unseal_key_b64="$(printf '%s' "$unseal_key" | base64 | tr -d '\n')"
                root_token_b64="$(printf '%s' "$root_token" | base64 | tr -d '\n')"

                secret_payload="$(cat <<EOF
              {
                "apiVersion": "v1",
                "kind": "Secret",
                "metadata": {
                  "name": "vault-init-keys",
                  "namespace": "vault"
                },
                "type": "Opaque",
                "data": {
                  "init.json": "${init_json_b64}",
                  "unseal_key": "${unseal_key_b64}",
                  "root_token": "${root_token_b64}"
                }
              }
              EOF
              )"

                kube_post "/api/v1/namespaces/vault/secrets" "$secret_payload" >/dev/null
                vault operator unseal "$unseal_key"
                exit 0
              fi

              if printf '%s' "$status_json" | grep -q '"sealed"[[:space:]]*:[[:space:]]*true'; then
                echo "Vault is already initialized and sealed, reusing stored unseal key"
                secret_json="$(kube_get "/api/v1/namespaces/vault/secrets/vault-init-keys")"
                secret_json_compact="$(printf '%s' "$secret_json" | tr -d '\n')"
                encoded_unseal_key="$(printf '%s' "$secret_json_compact" | sed -n 's/.*"unseal_key":"\([^"]*\)".*/\1/p')"

                if [ -z "$encoded_unseal_key" ]; then
                  echo "vault-init-keys Secret is missing unseal_key" >&2
                  exit 1
                fi

                unseal_key="$(printf '%s' "$encoded_unseal_key" | base64 -d)"
                vault operator unseal "$unseal_key"
                exit 0
              fi

              echo "Vault is already initialized and unsealed"

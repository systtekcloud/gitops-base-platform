# =============================================================================
# Platform App of Apps
#
# PREREQUISITO (scripts manuales, antes de aplicar este manifiesto):
#   1. ./scripts/02-install-cni-metallb.sh dev|pro
#   2. ./scripts/03-install-apisix.sh dev|pro       ← APISIX no lo gestiona ArgoCD
#   3. ./scripts/04-install-argocd.sh dev|pro
#   4. ./scripts/05-install-vault.sh dev|pro         ← Vault+VSO no los gestiona ArgoCD
#      + init + unseal manual
#      + ./scripts/05-seed-vault.sh dev|pro          ← secrets deben existir antes de Wave 3
#
# SYNC-WAVE ORDER (solo lo que gestiona ArgoCD):
#   Wave 1: kyverno, mongodb-operator, crossplane    ← operators
#   Wave 3: keycloak-secrets                         ← VaultStaticSecret+VaultAuth (requiere VSO)
#           grafana-secrets                          ← VaultStaticSecret+VaultAuth (requiere VSO)
#           prometheus-stack
#   Wave 4: keycloak-postgres                        ← requiere keycloak-db-secret de Wave 3
#           kargo
#   Wave 5: keycloak                                 ← requiere secrets + postgres
#   Wave 6: grafana                                  ← requiere keycloak + prometheus
# =============================================================================
apiVersion: argoproj.io/v1alpha1
kind: AppProject
metadata:
  name: cloudframe-platform
  namespace: argo
spec:
  description: Platform components managed by ArgoCD
  sourceRepos:
    - '*'
  destinations:
    - namespace: '*'
      server: https://kubernetes.default.svc
  clusterResourceWhitelist:
    - group: '*'
      kind: '*'

# Cluster-level parameters — override per environment via ArgoCD helm.values
clusterName: eks-vcluster-dev
nodeRoleName: eks-vcluster-eks-node-role

node_pool:
  - nodePoolName: general
    nodePoolKind: NodePool
    labels:
      intent: apps
    requirements:
      - key: kubernetes.io/arch
        operator: In
        values: ["amd64"]
      - key: kubernetes.io/os
        operator: In
        values: ["linux"]
      - key: karpenter.sh/capacity-type
        operator: In
        values: ["on-demand"]
      - key: karpenter.k8s.aws/instance-category
        operator: In
        values: ["t", "m"]
      - key: karpenter.k8s.aws/instance-family
        operator: In
        values: ["t3a", "m5a"]
      - key: karpenter.k8s.aws/instance-cpu
        operator: In
        values: ["2", "4", "8"]
      - key: karpenter.k8s.aws/instance-hypervisor
        operator: In
        values: ["nitro"]
      - key: karpenter.k8s.aws/instance-generation
        operator: Gt
        values: ["2"]
      - key: topology.kubernetes.io/zone
        operator: In
        values: ["eu-west-1a", "eu-west-1b", "eu-west-1c"]
    nodeClassRef:
      group: karpenter.k8s.aws
      kind: EC2NodeClass
      name: general-node-class
    limits:
      cpu: "20"
      memory: 100Gi
    disruption:
      consolidationPolicy: WhenEmptyOrUnderutilized
      consolidateAfter: 30s
      expireAfter: 24h

ec2_node_class:
  - nodeClassName: general
    nodeClassKind: EC2NodeClass
    spec:
      amiFamily: AL2023
      amiSelectorTerms:
        - alias: al2023@latest

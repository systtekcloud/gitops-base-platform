# =============================================================================
# Monitoring Stack — Default Values
# kube-prometheus-stack: Prometheus + Grafana + Alertmanager + Exporters
# =============================================================================

kube-prometheus-stack:
  # ---------------------------------------------------------------------------
  # Prometheus
  # ---------------------------------------------------------------------------
  prometheus:
    prometheusSpec:
      retention: 15d
      retentionSize: "45GB"

      storageSpec:
        volumeClaimTemplate:
          spec:
            storageClassName: gp3
            accessModes: ["ReadWriteOnce"]
            resources:
              requests:
                storage: 50Gi

      resources:
        requests:
          cpu: 500m
          memory: 1Gi
        limits:
          cpu: "1"
          memory: 2Gi

      # Schedule on Karpenter-provisioned nodes (not system nodes)
      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
              - matchExpressions:
                  - key: karpenter.sh/nodepool
                    operator: Exists

    # ServiceMonitor for Prometheus self-monitoring
    serviceMonitor:
      selfMonitor: true

  # ---------------------------------------------------------------------------
  # Grafana
  # ---------------------------------------------------------------------------
  grafana:
    adminPassword: "" # Set via --set or secret in production

    persistence:
      enabled: true
      storageClassName: gp3
      size: 10Gi

    resources:
      requests:
        cpu: 250m
        memory: 512Mi
      limits:
        cpu: 500m
        memory: 1Gi

    # Pre-configured datasource
    datasources:
      datasources.yaml:
        apiVersion: 1
        datasources:
          - name: Prometheus
            type: prometheus
            url: http://{{ .Release.Name }}-kube-prometheus-stack-prometheus:9090
            access: proxy
            isDefault: true

    # Default dashboards
    dashboardProviders:
      dashboardproviders.yaml:
        apiVersion: 1
        providers:
          - name: default
            orgId: 1
            folder: ""
            type: file
            disableDeletion: false
            editable: true
            options:
              path: /var/lib/grafana/dashboards/default

    dashboards:
      default:
        kubernetes-cluster:
          gnetId: 6417
          revision: 1
          datasource: Prometheus
        kubernetes-pods:
          gnetId: 6336
          revision: 1
          datasource: Prometheus
        node-exporter:
          gnetId: 1860
          revision: 37
          datasource: Prometheus
        karpenter:
          gnetId: 20398
          revision: 3
          datasource: Prometheus

    # Schedule on Karpenter nodes
    affinity:
      nodeAffinity:
        requiredDuringSchedulingIgnoredDuringExecution:
          nodeSelectorTerms:
            - matchExpressions:
                - key: karpenter.sh/nodepool
                  operator: Exists

    service:
      type: ClusterIP

  # ---------------------------------------------------------------------------
  # Alertmanager
  # ---------------------------------------------------------------------------
  alertmanager:
    alertmanagerSpec:
      resources:
        requests:
          cpu: 100m
          memory: 128Mi
        limits:
          cpu: 200m
          memory: 256Mi

      storage:
        volumeClaimTemplate:
          spec:
            storageClassName: gp3
            accessModes: ["ReadWriteOnce"]
            resources:
              requests:
                storage: 5Gi

      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
              - matchExpressions:
                  - key: karpenter.sh/nodepool
                    operator: Exists

  # ---------------------------------------------------------------------------
  # Alert Rules
  # ---------------------------------------------------------------------------
  additionalPrometheusRulesMap:
    custom-alerts:
      groups:
        - name: cluster-health
          rules:
            - alert: HighCPUUsage
              expr: 100 - (avg by(instance) (rate(node_cpu_seconds_total{mode="idle"}[5m])) * 100) > 80
              for: 10m
              labels:
                severity: warning
              annotations:
                summary: "High CPU usage on {{ $labels.instance }}"
                description: "CPU usage is above 80% for more than 10 minutes."

            - alert: HighMemoryUsage
              expr: (1 - node_memory_MemAvailable_bytes / node_memory_MemTotal_bytes) * 100 > 85
              for: 10m
              labels:
                severity: warning
              annotations:
                summary: "High memory usage on {{ $labels.instance }}"
                description: "Memory usage is above 85% for more than 10 minutes."

            - alert: PodCrashLooping
              expr: rate(kube_pod_container_status_restarts_total[15m]) * 60 * 15 > 0
              for: 15m
              labels:
                severity: critical
              annotations:
                summary: "Pod {{ $labels.namespace }}/{{ $labels.pod }} is crash looping"
                description: "Pod has been restarting for more than 15 minutes."

            - alert: NodeNotReady
              expr: kube_node_status_condition{condition="Ready",status="true"} == 0
              for: 5m
              labels:
                severity: critical
              annotations:
                summary: "Node {{ $labels.node }} is not ready"
                description: "Node has been in NotReady state for more than 5 minutes."

  # ---------------------------------------------------------------------------
  # Node Exporter — runs as DaemonSet on all nodes
  # ---------------------------------------------------------------------------
  nodeExporter:
    enabled: true

  prometheus-node-exporter:
    tolerations:
      - operator: Exists

  # ---------------------------------------------------------------------------
  # Kube State Metrics
  # ---------------------------------------------------------------------------
  kubeStateMetrics:
    enabled: true
